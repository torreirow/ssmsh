before:
  hooks:
    - go mod download

builds:
  - env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.Version={{.Version}}

archives:
  - format: tar.gz
    format_overrides:
      - goos: windows
        format: zip
    files:
      - none*

changelog:
  sort: asc
  use: github
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^ci:'
  groups:
    - title: 'Breaking Changes'
      regexp: "^.*BREAKING.*$"
      order: 0
    - title: 'Features'
      regexp: "^.*feat.*$"
      order: 1
    - title: 'Bug Fixes'
      regexp: "^.*fix.*$"
      order: 2
    - title: 'Other Changes'
      order: 999

release:
  header: |
    ## New Features

    ### Tab Completion
    Intelligent tab completion for AWS Parameter Store paths and parameters with async background fetching to prevent terminal freezing.

    ### XDG Configuration Support
    Configuration files now follow XDG Base Directory specification (`~/.config/ssmsh/config`).

    **No action required** - migration happens automatically on first run. Your original `~/.ssmshrc` will be backed up to `~/.ssmshrc.backup`.

    ### Get Decrypt Flag
    New `-d` / `--decrypt` flag for inline SecureString parameter decryption without changing global settings.

    See the [CHANGELOG](https://github.com/torreirow/ssmsh/blob/main/CHANGELOG.md) for full details.
  footer: |
    **Full Changelog**: https://github.com/torreirow/ssmsh/compare/{{ .PreviousTag }}...{{ .Tag }}
