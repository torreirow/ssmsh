name: Build

on:
  push:

env:
  AWS_DEFAULT_REGION: us-east-1

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      - uses: actions/setup-go@v2
        with:
          go-version: 1.17
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v2
        with:
          version: v1.56.1
          args: --enable golint
  test-and-build:
    name: Test and build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      - uses: actions/setup-go@v2
        with:
          go-version: 1.17
      - name: Vet
        run: go vet -v $(go list ./...)
      - name: Test
        run: go test -v -race -coverprofile=coverage.out $(go list ./...)
      - name: Integration Tests
        run: go test -v -tags=integration ./...
      - name: Benchmark
        run: go test -bench=. -benchmem -run=^$ ./commands
      - name: Coverage Check
        run: |
          go tool cover -func=coverage.out | tee coverage.txt
          TOTAL_COV=$(go tool cover -func=coverage.out | grep total | awk '{print $3}' | sed 's/%//')
          echo "Total coverage: ${TOTAL_COV}%"
          # Require > 80% overall coverage
          if (( $(echo "$TOTAL_COV < 80" | bc -l) )); then
            echo "Coverage ${TOTAL_COV}% is below 80% threshold"
            exit 1
          fi
      - name: Build
        run: make build
